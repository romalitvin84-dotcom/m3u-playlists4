name: Автоматическое обновление плейлиста

on:
  schedule:
    - cron: '0 0 * * *'  # каждый день в 00:00 по UTC
  workflow_dispatch:  # запуск вручную

jobs:
  update-playlist:
    runs-on: ubuntu-latest
    
    steps:
      # Шаг 1: Скачиваем репозиторий
      - name: Забрать файлы
        uses: actions/checkout@v4

      # Шаг 2: Устанавливаем Python
      - name: Подготовить Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Шаг 3: Запускаем программу для слияния плейлистов
      - name: Запустить программу
        run: python scripts/merge.py

      # Шаг 4: Сохраняем результат
      - name: Сохранить результат
        run: |
          git config user.name "github"
          git config user.email "github@github.com"
          git add output/final.m3u
          git commit -m "Автоматическое обновление плейлиста" || true
          git push
